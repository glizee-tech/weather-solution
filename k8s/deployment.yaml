# GKE Autopilot — ajuste PROJECT_ID / image dans le champ image ci-dessous.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-planner
  labels:
    app: weather-planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-planner
  template:
    metadata:
      labels:
        app: weather-planner
    spec:
      containers:
        - name: weather-planner
          # Remplace par ton Artifact Registry après build/push
          image: europe-west9-docker.pkg.dev/weather-interface/weather-planner/app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 512Mi
